server {
    listen 80;
    server_name localhost;

    # Folder root harus mengarah ke sub-folder 'client'
    # karena React Router v7 memisahkan output server dan client
    root /builds/current/build/client;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # 1. Main Application Route
    location / {
        try_files $uri $uri/ /index.html;

        # HTML tidak boleh di-cache secara agresif agar user
        # langsung mendapat update saat kita deploy baru.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 2. Static Assets (JS, CSS, Images dengan Hash)
    # Vite/React Router memberikan hash unik pada file di folder assets
    location /assets/ {
        # File di sini aman di-cache selamanya karena namanya akan berubah jika konten berubah
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # 3. Service Worker & Manifest
    # Harus selalu fresh agar proses update aplikasi berjalan lancar
    location ~* ^/(service-worker\.js|manifest\.json)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
        access_log off;
    }

    # 4. Security Headers (Optional but Recommended)
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";

    # 5. Logging & Favicon
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # Error Page handling
    error_page 404 /index.html;
}