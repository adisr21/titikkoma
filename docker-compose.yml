version: "3.9"

services:
  app:
    build: .
    container_name: titikkoma_app
    restart: always
    expose:
      - "3000"
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - web

  nginx:
    image: nginx:alpine
    container_name: titikkoma_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - web

networks:
  web: