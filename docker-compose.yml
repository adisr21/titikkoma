version: '3.8'

services:
  # The React Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: titikkoma_frontend
    restart: always
    ports:
      - "3000:3000" # Expose the React app on port 3000
    networks:
      - titikkoma_network
    # We don't expose ports here because Nginx will handle external traffic

  # The Reverse Proxy (Nginx)
  nginx-proxy:
    image: nginx:stable-alpine
    container_name: titikkoma_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443" # For future SSL/HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Optional: mount your build folder if you prefer not to build inside the proxy image
      # - ./dist:/usr/share/nginx/html:ro
    depends_on:
      - app
    networks:
      - titikkoma_network

networks:
  titikkoma_network:
    driver: bridge