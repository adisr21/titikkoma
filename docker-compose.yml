version: "3.9"

services:
  app:
    build: .
    container_name: titikkoma_app
    restart: always
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - web

  nginx:
    image: nginx:alpine
    container_name: titikkoma_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - web

networks:
  web: